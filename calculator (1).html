<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #f0f4ff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Outfit', sans-serif;
  }

  .calc {
    width: 320px;
    background: #ffffff;
    border-radius: 32px;
    padding: 24px;
    box-shadow: 0 20px 60px rgba(100,120,200,0.15), 0 4px 16px rgba(100,120,200,0.08);
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  .display {
    background: #f5f7ff;
    border-radius: 20px;
    padding: 20px 22px 16px;
    margin-bottom: 20px;
    text-align: right;
    border: 1.5px solid #e8ecff;
  }

  .display .expr {
    font-size: 13px;
    color: #a0aacb;
    font-weight: 400;
    min-height: 18px;
    margin-bottom: 4px;
  }

  .display .value {
    font-size: 52px;
    font-weight: 300;
    color: #1a1f3c;
    line-height: 1;
    letter-spacing: -2px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }

  .btn {
    height: 66px;
    border-radius: 16px;
    border: none;
    cursor: pointer;
    font-family: 'Outfit', sans-serif;
    font-size: 20px;
    font-weight: 500;
    transition: transform 0.1s, box-shadow 0.1s, background 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
  }

  .btn-num {
    background: #ffffff;
    color: #1a1f3c;
    box-shadow: 0 4px 0 #dde2f5, 0 2px 8px rgba(100,120,200,0.08);
    border: 1.5px solid #eaeeff;
  }
  .btn-num:hover { background: #f5f7ff; transform: translateY(-1px); }
  .btn-num:active { transform: translateY(3px); box-shadow: 0 1px 0 #dde2f5; }

  .btn-op {
    background: #eef0ff;
    color: #4a5af0;
    font-size: 22px;
    box-shadow: 0 4px 0 #c8cdf5, 0 2px 8px rgba(74,90,240,0.1);
    border: 1.5px solid #dde0ff;
  }
  .btn-op:hover { background: #e5e8ff; transform: translateY(-1px); }
  .btn-op:active { transform: translateY(3px); box-shadow: 0 1px 0 #c8cdf5; }

  .btn-eq {
    background: #4a5af0;
    color: #ffffff;
    font-size: 24px;
    box-shadow: 0 4px 0 #2d3bc4, 0 4px 16px rgba(74,90,240,0.35);
    border: none;
  }
  .btn-eq:hover { background: #5a6af8; transform: translateY(-2px); box-shadow: 0 6px 0 #2d3bc4, 0 8px 24px rgba(74,90,240,0.4); }
  .btn-eq:active { transform: translateY(3px); box-shadow: 0 1px 0 #2d3bc4; }

  .btn-clear {
    background: #fff0f0;
    color: #e05050;
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 1px;
    box-shadow: 0 4px 0 #f5cccc, 0 2px 8px rgba(220,80,80,0.08);
    border: 1.5px solid #fadddd;
  }
  .btn-clear:hover { background: #ffe8e8; transform: translateY(-1px); }
  .btn-clear:active { transform: translateY(3px); box-shadow: 0 1px 0 #f5cccc; }

  .btn-util {
    background: #f5f7ff;
    color: #8090c0;
    font-size: 16px;
    box-shadow: 0 4px 0 #dde2f5, 0 2px 8px rgba(100,120,200,0.06);
    border: 1.5px solid #eaeeff;
  }
  .btn-util:hover { background: #eef0ff; color: #4a5af0; transform: translateY(-1px); }
  .btn-util:active { transform: translateY(3px); box-shadow: 0 1px 0 #dde2f5; }

  .btn-wide {
    grid-column: span 2;
    justify-content: flex-start;
    padding-left: 26px;
  }

  @keyframes pop {
    from { opacity: 0; transform: scale(0.88) translateY(20px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .btn { animation: fadeUp 0.35s cubic-bezier(0.34,1.4,0.64,1) both; }
  .btn:nth-child(1)  { animation-delay: 0.10s }
  .btn:nth-child(2)  { animation-delay: 0.13s }
  .btn:nth-child(3)  { animation-delay: 0.16s }
  .btn:nth-child(4)  { animation-delay: 0.19s }
  .btn:nth-child(5)  { animation-delay: 0.22s }
  .btn:nth-child(6)  { animation-delay: 0.25s }
  .btn:nth-child(7)  { animation-delay: 0.28s }
  .btn:nth-child(8)  { animation-delay: 0.31s }
  .btn:nth-child(9)  { animation-delay: 0.34s }
  .btn:nth-child(10) { animation-delay: 0.37s }
  .btn:nth-child(11) { animation-delay: 0.40s }
  .btn:nth-child(12) { animation-delay: 0.43s }
  .btn:nth-child(13) { animation-delay: 0.46s }
  .btn:nth-child(14) { animation-delay: 0.49s }
  .btn:nth-child(15) { animation-delay: 0.52s }
  .btn:nth-child(16) { animation-delay: 0.55s }
  .btn:nth-child(17) { animation-delay: 0.58s }
  .btn:nth-child(18) { animation-delay: 0.61s }
  .btn:nth-child(19) { animation-delay: 0.64s }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>

<div class="calc">
  <div class="display">
    <div class="expr">0 + 0</div>
    <div class="value">0</div>
  </div>

  <div class="grid">
    <button class="btn btn-clear">AC</button>
    <button class="btn btn-util">+/−</button>
    <button class="btn btn-util">%</button>
    <button class="btn btn-op">÷</button>

    <button class="btn btn-num">7</button>
    <button class="btn btn-num">8</button>
    <button class="btn btn-num">9</button>
    <button class="btn btn-op">×</button>

    <button class="btn btn-num">4</button>
    <button class="btn btn-num">5</button>
    <button class="btn btn-num">6</button>
    <button class="btn btn-op">−</button>

    <button class="btn btn-num">1</button>
    <button class="btn btn-num">2</button>
    <button class="btn btn-num">3</button>
    <button class="btn btn-op">+</button>

    <button class="btn btn-num btn-wide">0</button>
    <button class="btn btn-num">.</button>
    <button class="btn btn-eq">=</button>
  </div>
</div>

</body>
</html>
